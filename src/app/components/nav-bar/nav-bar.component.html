<nav class="navbar">
  <div class="nav-links">
    <a routerLink="">{{ "HOME" | translate }}</a>
    <a routerLink="/about">{{ "ABOUT" | translate }}</a>
    <a routerLink="/contact">{{ "CONTACT" | translate }}</a>
    <a routerLink="/admin">{{ "ADMIN" | translate }}</a>
    <a routerLink="/sse">{{ "SSE" | translate }}</a>
    <a routerLink="/ws">{{ "WS" | translate }}</a>
  </div>

  <div class="nav-right">
    <div class="language-box">
      @if (idioma === 'es') {
      <img src="../../../assets/i18n/images/Bandera_nacional_de_España.png" alt="Bandera de España" class="bandera">
      }
      @else {
      <img src="../../../assets/i18n/images/png-clipart-flag-of-england-flag-of-the-united-kingdom-flag-of-the-city-of-london-england-angle-english.png" alt="Bandera de España" class="bandera">
      }

      <select class="language-select" [value]="idioma" (change)="cambiarIdioma($event)">
        <option value="es">Español</option>
        <option value="en">English</option>
      </select>
    </div>

    @if (!estaLogeado) {
      <div class="login-box">
        <a routerLink="/login" class="login-link">{{ "LOGIN" | translate }}</a>
      </div>
    } @else {
      <button mat-button class="logout-btn" (click)="cerrarSesion()">
        {{ "LOGOUT" | translate }}
      </button>
