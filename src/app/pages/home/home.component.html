<div class="page">
  <app-nav-bar></app-nav-bar>

  <div class="contenido-principal">
    <app-title class="titulo"></app-title>

    @if (usuario != '') {
      <h1>{{ usuario | saludo }}</h1>
    }

    <div class="tarjetas">
      <Card></Card>
    </div>

    <div class="pipes-panel">
      <button class="pipes-toggle" (click)="mostrarPipes = !mostrarPipes">
        <span>{{ "USEDPIPES" | translate }}</span>
        <span class="flecha" [class.abierta]="mostrarPipes">⌄</span>
      </button>

      @if (mostrarPipes) {
        <div class="pipes-content">
          <div class="pipe-item">
            <h3>{{ "DOUBLEPIPES" | translate }}</h3>
            <p> {{ "DOUBLEDESCRIPTION" | translate }} <strong>{{ visitas | doble }}</strong></p>
          </div>

          <div class="pipe-item">
            <h3>{{ "HIGHLIGHTPIPES" | translate }}</h3>
            <p [innerHTML]="(texto | translate) | resaltar"></p>
          </div>

          <div class="pipe-item">
            <h3>{{ "AGEPIPES" | translate }}</h3>
            <p> {{ "AGEDESCRIPTION" | translate }} <strong>{{ fecha_nacimiento | edad }}</strong></p>
          </div>
        </div>
      }
    </div>
  </div>

  <app-footer></app-footer>
</div>
